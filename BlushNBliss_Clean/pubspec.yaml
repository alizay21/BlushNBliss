name: blushnbliss
description: "A beauty services booking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # Core / UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State / Utils
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0

  # Form / Pickers
  table_calendar: ^3.1.2
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/